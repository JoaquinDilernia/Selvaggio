<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="wineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B1538;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#430a33;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- Copa de vino -->
  <g transform="translate(50, 50)">
    <!-- Copa -->
    <path d="M -15 -35 Q -20 -25, -18 -15 L -15 10 L -8 25 L 8 25 L 15 10 L 18 -15 Q 20 -25, 15 -35 Z" 
          fill="url(#wineGradient)" stroke="#ac987f" stroke-width="1"/>
    
    <!-- Vino dentro de la copa -->
    <path d="M -14 -30 Q -17 -22, -16 -15 L -13 5 L 13 5 L 16 -15 Q 17 -22, 14 -30 Z" 
          fill="#8B1538" opacity="0.9"/>
    
    <!-- Reflejo/brillo en la copa -->
    <ellipse cx="-8" cy="-20" rx="3" ry="8" fill="white" opacity="0.3"/>
    
    <!-- Pie de la copa -->
    <rect x="-2" y="25" width="4" height="12" fill="#ac987f"/>
    
    <!-- Base -->
    <ellipse cx="0" cy="37" rx="12" ry="3" fill="#ac987f"/>
  </g>
</svg>

